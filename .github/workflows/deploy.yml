name: CI/CD Pipeline to EC2

on:
  push:
    branches:
      - main # Chạy workflow khi code được push lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./ShoesStore_Backend # Trỏ tới thư mục chứa BE
          file: ./ShoesStore_Backend/Dockerfile.backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-dotnet-api:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./ShoesStore_FrontEnd # Trỏ tới thư mục chứa FE
          file: ./ShoesStore_FrontEnd/Dockerfile.frontend
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: ${{ secrets.DOCKER_USERNAME }}/my-react-app:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu"

      - name: Execute Deploy Commands on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu

            cat > .env <<'EOF'
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            DB_CONNECTION=${{ secrets.DB_CONNECTION }}
            JWT_ISSUER=${{ secrets.JWT_ISSUER }}
            JWT_AUDIENCE=${{ secrets.JWT_AUDIENCE }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            EMAIL_SMTP_SERVER=${{ secrets.EMAIL_SMTP_SERVER }}
            EMAIL_SMTP_PORT=${{ secrets.EMAIL_SMTP_PORT }}
            EMAIL_SMTP_SENDER_NAME=${{ secrets.EMAIL_SMTP_SENDER_NAME }}
            EMAIL_SMTP_SENDER_EMAIL=${{ secrets.EMAIL_SMTP_SENDER_EMAIL }}
            EMAIL_SMTP_PASSWORD=${{ secrets.EMAIL_SMTP_PASSWORD }}
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
            AUTH_REFRESH_COOKIE_SECURE=${{ secrets.AUTH_REFRESH_COOKIE_SECURE }}
            AUTH_REFRESH_COOKIE_SAMESITE=${{ secrets.AUTH_REFRESH_COOKIE_SAMESITE }}
            EOF

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Kéo images mới nhất về
            if docker compose version >/dev/null 2>&1; then
              docker compose pull
              # Restart các container với images mới
              docker compose up -d --remove-orphans
            else
              docker-compose pull
              # Restart các container với images mới
              docker-compose up -d --remove-orphans
            fi

            # Xóa các image rác cũ để tránh đầy ổ cứng
            docker image prune -f
