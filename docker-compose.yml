version: "3.8"

services:
  frontend:
    image: ${DOCKER_USERNAME}/my-react-app:latest
    ports:
      - "80:80"
    restart: always

  backend:
    image: ${DOCKER_USERNAME}/my-dotnet-api:latest
    environment:
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Cors__AllowedOrigins=${CORS_ALLOWED_ORIGINS}
      - Auth__RefreshTokenCookie__Secure=${AUTH_REFRESH_COOKIE_SECURE}
      - Auth__RefreshTokenCookie__SameSite=${AUTH_REFRESH_COOKIE_SAMESITE}
      - EmailSettings__SmtpServer=${EMAIL_SMTP_SERVER}
      - EmailSettings__SmtpPort=${EMAIL_SMTP_PORT}
      - EmailSettings__SenderName=${EMAIL_SMTP_SENDER_NAME}
      - EmailSettings__SenderEmail=${EMAIL_SMTP_SENDER_EMAIL}
      - EmailSettings__Password=${EMAIL_SMTP_PASSWORD}
      - Supabase__Url=${SUPABASE_URL}
      - Supabase__Service_Role_Key=${SUPABASE_SERVICE_ROLE_KEY}
    ports:
      - "8080:8080"
    restart: always
